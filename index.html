<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div id="tool-bar">
            <h1>Eatch a Skeatch</h1>
            <div id="btn-container">
                <button type="button" onclick="getUserInput()">Set Grid</button>
                <button type="button" id="random" >Random color</button>
                <button type="button" id="lighter" >Lighter</button>
                <button type="button" id="darker" >Darker</button>
                <button type="button" onclick="clearing()" >Clear</button>
                <button type="button" onclick="reset()">Reset tool</button>
            </div>
        </div>
        <div>
            <div id="sketch-pad">
            </div>
        </div>
    </main>
    <script src="script.js" defer></script>
</body>
</html>
